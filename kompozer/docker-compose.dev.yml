# docker-compose.dev.yml — Ambiente di sviluppo con i soli servizi implementati.
# Avvia: apiGateway (3000), authenticationService (3001), catalogService (3002),
# MongoDB auth (host:27017), MongoDB catalog (host:27018), Redis (host:6379).
#
# Le porte MongoDB sono esposte all'host per permettere la connessione da
# MongoDB Compass durante lo sviluppo.
#
# Uso:
#   docker compose -f docker-compose.dev.yml up --build
#   docker compose -f docker-compose.dev.yml down -v   # rimuove anche i volumi

services:

  # ── Infrastructure ──────────────────────────────────────────────────────────

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

  mongo-auth:
    image: mongo:7
    ports:
      - "27017:27017"          # Compass: mongodb://root:changeme@localhost:27017/?authSource=admin
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: changeme
      MONGO_INITDB_DATABASE: authdb
    volumes:
      - mongo-auth-data:/data/db
    restart: unless-stopped

  mongo-catalog:
    image: mongo:7
    ports:
      - "27018:27017"          # Compass: mongodb://root:changeme@localhost:27018/?authSource=admin
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: changeme
      MONGO_INITDB_DATABASE: catalogdb
    volumes:
      - mongo-catalog-data:/data/db
    restart: unless-stopped

  mongo-cart:
    image: mongo:7
    ports:
      - "27019:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: changeme
      MONGO_INITDB_DATABASE: cartdb
    volumes:
      - mongo-cart-data:/data/db
    restart: unless-stopped

  mongo-cad:
    image: mongo:7
    ports:
      - "27020:27017"          # Compass: mongodb://root:changeme@localhost:27020/?authSource=admin
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: changeme
      MONGO_INITDB_DATABASE: caddb
    volumes:
      - mongo-cad-data:/data/db
    restart: unless-stopped

  # ── Backend ─────────────────────────────────────────────────────────────────

  auth-service:
    build: ./backend/authenticationService
    environment:
      PORT: "3001"
      MONGO_URI: "mongodb://root:changeme@mongo-auth:27017/authdb?authSource=admin"
      JWT_SECRET: "kompozer-dev-secret-key-32-chars!!"
      SESSION_TTL_HOURS: "8"
    depends_on:
      - mongo-auth
    restart: unless-stopped

  catalog-service:
    build: ./backend/catalogService
    environment:
      PORT: "3002"
      MONGO_URI: "mongodb://root:changeme@mongo-catalog:27017/catalogdb?authSource=admin"
      REDIS_URL: "redis://redis:6379"
    depends_on:
      - mongo-catalog
      - redis
    restart: unless-stopped

  cart-service:
    build: ./backend/cartService
    environment:
      PORT: "3004"
      MONGO_URI: "mongodb://root:changeme@mongo-cart:27017/cartdb?authSource=admin"
    depends_on:
      - mongo-cart
    restart: unless-stopped

  cad-service:
    build: ./backend/cadService
    environment:
      PORT: "3003"
      MONGO_URI: "mongodb://root:changeme@mongo-cad:27017/caddb?authSource=admin"
      CATALOG_BASE_URL: "http://catalog-service:3002"
      CART_BASE_URL: "http://cart-service:3004"
    depends_on:
      - mongo-cad
      - catalog-service
      - cart-service
    restart: unless-stopped

  api-gateway:
    build: ./backend/apiGateway
    ports:
      - "3000:3000"
    environment:
      PORT: "3000"
      JWT_SECRET: "kompozer-dev-secret-key-32-chars!!"
      AUTH_SERVICE_URL: "http://auth-service:3001"
      CATALOG_SERVICE_URL: "http://catalog-service:3002"
      CAD_SERVICE_URL: "http://cad-service:3003"
      CART_SERVICE_URL: "http://cart-service:3004"
      NOTIFICATION_SERVICE_URL: "http://notification-service:3005"
      CHATBOT_SERVICE_URL: "http://chatbot-service:3006"
      REPORTING_SERVICE_URL: "http://reporting-service:3007"
    depends_on:
      - auth-service
      - catalog-service
      - cart-service
      - cad-service
    restart: unless-stopped

volumes:
  mongo-auth-data:
  mongo-catalog-data:
  mongo-cart-data:
  mongo-cad-data:
